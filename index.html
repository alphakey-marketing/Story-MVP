<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fool of Owari — Interactive Story MVP</title>
  <link rel="stylesheet" href="styles/base.css">
</head>
<body>
  <main id="main">

    <!-- Chapter title card interstitial -->
    <div id="chapter-card" class="chapter-card hidden">
      <div id="chapter-card-number"></div>
      <div id="chapter-card-title"></div>
      <div id="chapter-card-subtitle"></div>
    </div>

    <!-- Chapter menu button -->
    <div id="chapter-menu-bar">
      <button id="chapter-menu-btn">☰ Chapters</button>
    </div>

    <!-- Story content -->
    <div id="story-content">
      <div id="chapter-title" translate="no" class="notranslate">
        <span id="chapter-title-text"></span>
      </div>
      <div id="scene" translate="no" class="notranslate">
        <span id="scene-text"></span>
      </div>
      <div id="choices" translate="no" class="notranslate"></div>
    </div>

    <!-- Flag bar panel -->
    <div id="flag-bar">
      <div class="flag-bar-row">
        <span class="flag-label">Ruthless</span>
        <div class="flag-track"><div id="flag-ruthlessness" class="flag-fill"></div></div>
      </div>
      <div class="flag-bar-row">
        <span class="flag-label">Political</span>
        <div class="flag-track"><div id="flag-political_power" class="flag-fill"></div></div>
      </div>
      <div class="flag-bar-row">
        <span class="flag-label">Mitsuhide</span>
        <div class="flag-track"><div id="flag-mitsuhide_loyalty" class="flag-fill"></div></div>
      </div>
      <div class="flag-bar-row">
        <span class="flag-label">Bond</span>
        <div class="flag-track"><div id="flag-bond_strength" class="flag-fill"></div></div>
      </div>
      <div class="flag-bar-row">
        <span class="flag-label">Nohime</span>
        <div class="flag-track"><div id="flag-nohime_trust" class="flag-fill"></div></div>
      </div>
      <div class="flag-bar-row">
        <span class="flag-label">Ieyasu</span>
        <div class="flag-track"><div id="flag-ieyasu_trust" class="flag-fill"></div></div>
      </div>
    </div>

    <!-- Epilogue summary screen -->
    <div id="epilogue-screen" class="hidden"></div>

  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
